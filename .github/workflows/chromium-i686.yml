name: Chromium i686 Build (Latest Tarball)
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */2 * *'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH
      
      - name: Get Latest Version
        run: |
          # Fetch the directory listing, extract the latest version number
          # Official storage: https://commondatastorage.googleapis.com/chromium-browser-official/
          # This returns an XML list of files.
          LATEST_FILE=$(curl -s https://commondatastorage.googleapis.com/chromium-browser-official/ | grep -oE 'chromium-[0-9.]+\.tar\.xz' | sort -V | tail -n 1)
          VERSION=$(echo $LATEST_FILE | sed 's/chromium-\(.*\)\.tar\.xz/\1/')
          echo "LATEST_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Latest version detected: $VERSION"

      - name: Download Chromium Tarball
        run: |
          wget https://commondatastorage.googleapis.com/chromium-browser-official/chromium-$LATEST_VERSION.tar.xz
          tar -xf chromium-$LATEST_VERSION.tar.xz
          mv chromium-$LATEST_VERSION chromium_source
      
      - name: Install System Dependencies
        run: |
          cd chromium_source
          sudo ./build/install-build-deps.sh --lib32 --no-arm --no-nacl --no-prompt
      
      - name: Install i386 Sysroot
        run: |
          cd chromium_source
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=i386
          
      - name: GN Gen
        run: |
          cd chromium_source
          mkdir -p out/Release_x86
          gn gen out/Release_x86 --args='target_cpu="x86" is_debug=false symbol_level=0'
          
      - name: Build
        run: |
          cd chromium_source
          autoninja -C out/Release_x86 chrome
