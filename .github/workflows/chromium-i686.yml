name: Chromium i686 Build (Cloud Experiment)
on:
  push:
  workflow_dispatch:

jobs:
  experimental_build:
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize Runner Disk Space
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h
          # Aggressively wipe pre-installed software we don't need
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          echo "=== Disk space AFTER cleanup ==="
          df -h

      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ${{ github.workspace }}/depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH

      - name: Get Latest Version String
        id: version
        run: |
          # Querying the official public layout repository index page
          LATEST_FILE=$(curl -s https://googleapis.com | grep -oE 'chromium-[0-9.]+\.tar\.xz' | sort -V | tail -n 1)
          VERSION=$(echo $LATEST_FILE | sed 's/chromium-\(.*\)\.tar\.xz/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Target Version: $VERSION"

      - name: Stream Extract Chromium Tarball
        run: |
          mkdir -p ${{ github.workspace }}/chromium_source
          echo "Streaming download and extracting simultaneously to save disk..."
          # Fixed URL formatting to hit the official Google public build engine storage bucket
          curl -sL https://googleapis.comchromium-$VERSION.tar.xz | tar -xJ -C ${{ github.workspace }}/chromium_source --strip-components=1

      - name: Install System Dependencies
        run: |
          cd ${{ github.workspace }}/chromium_source
          # Pass non-interactive flags so apt doesn't freeze waiting for user input
          sudo DEBIAN_FRONTEND=noninteractive ./build/install-build-deps.sh --lib32 --no-arm --no-nacl --no-prompt --no-chromeos-fonts || echo "Ignoring errors"
      
      - name: Install i386 Sysroot
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=i386
          
      - name: GN Project Gen
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          mkdir -p out/Release_x86
          # Using the absolute bare minimum configurations to prevent early memory crashes
          gn gen out/Release_x86 --args='target_cpu="x86" is_debug=false symbol_level=0 blink_symbol_level=0 enable_nacl=false is_official_build=true'
          
      - name: The 6-Hour Max Compile Battle
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          echo "Starting compiler. Let's see how many objects a dual-core runner can process in 6 hours..."
          autoninja -C out/Release_x86 chrome
