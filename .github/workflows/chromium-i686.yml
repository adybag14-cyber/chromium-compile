name: Chromium i686 Build (Tarball)
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */2 * *'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH
      
      - name: Download Chromium Tarball
        run: |
          # Download a recent stable version
          # NOTE: Version needs to be updated periodically or automated
          VERSION="134.0.6998.35"
          wget https://commondatastorage.googleapis.com/chromium-browser-official/chromium-$VERSION.tar.xz
          tar -xf chromium-$VERSION.tar.xz
          mv chromium-$VERSION chromium_source
      
      - name: Install System Dependencies
        run: |
          cd chromium_source
          sudo ./build/install-build-deps.sh --lib32 --no-arm --no-nacl --no-prompt
      
      - name: Install i386 Sysroot
        run: |
          cd chromium_source
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=i386
          
      - name: GN Gen
        run: |
          cd chromium_source
          mkdir -p out/Release_x86
          gn gen out/Release_x86 --args='target_cpu="x86" is_debug=false symbol_level=0'
          
      - name: Build
        run: |
          cd chromium_source
          autoninja -C out/Release_x86 chrome
