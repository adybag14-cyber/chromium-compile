name: Chromium i686 Build (Cloud Experiment)
on:
  push:
  workflow_dispatch:

jobs:
  experimental_build:
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize Runner Disk Space
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          echo "=== Disk space AFTER cleanup ==="
          df -h

      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ${{ github.workspace }}/depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          ${{ github.workspace }}/depot_tools/update_depot_tools

      - name: Get Latest Version String
        id: version
        run: |
          VERSION=$(curl -s "https://versionhistory.googleapis.com/v1/chrome/platforms/linux/channels/stable/versions" | jq -r '.versions[0].version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
             VERSION="126.0.6478.114"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Target Version: $VERSION"

      - name: Stream Extract Chromium Tarball
        run: |
          mkdir -p ${{ github.workspace }}/chromium_source
          echo "Streaming download and extracting simultaneously..."
          curl -sL "https://commondatastorage.googleapis.com/chromium-browser-official/chromium-$VERSION.tar.xz" | tar -xJ -C ${{ github.workspace }}/chromium_source --strip-components=1

      - name: Install System Dependencies
        run: |
          cd ${{ github.workspace }}/chromium_source
          sudo DEBIAN_FRONTEND=noninteractive ./build/install-build-deps.sh --lib32 --no-arm --no-nacl --no-prompt --no-chromeos-fonts || echo "Ignoring dependency errors"
      
      - name: Install i386 Sysroot
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=i386

      - name: Patch GN for x86 Linux support
        run: |
          cd ${{ github.workspace }}/chromium_source
          echo "=== Patching GN x86 Linux assertion ==="
          
          # Patch root BUILD.gn
          if grep -q 'is_valid_x86_target || target_cpu != "x86"' BUILD.gn; then
            sed -i 's/is_valid_x86_target || target_cpu != "x86" || v8_target_cpu == "arm"/true/' BUILD.gn
            echo "Patched root BUILD.gn"
          fi
          
          # Patch v8/BUILD.gn if it exists
          if [ -f v8/BUILD.gn ] && grep -q 'is_valid_x86_target || target_cpu != "x86"' v8/BUILD.gn; then
            sed -i 's/is_valid_x86_target || target_cpu != "x86" || v8_target_cpu == "arm"/true/' v8/BUILD.gn
            echo "Patched v8/BUILD.gn"
          fi
          
          # Patch build/config/BUILD.gn if similar check exists
          if [ -f build/config/BUILD.gn ] && grep -q 'is_valid_x86_target' build/config/BUILD.gn; then
            sed -i 's/is_valid_x86_target || target_cpu != "x86" || v8_target_cpu == "arm"/true/' build/config/BUILD.gn
            echo "Patched build/config/BUILD.gn"
          fi
          
          # Patch build/config/BUILDCONFIG.gn if similar check exists
          if [ -f build/config/BUILDCONFIG.gn ] && grep -q 'is_valid_x86_target' build/config/BUILDCONFIG.gn; then
            sed -i 's/is_valid_x86_target || target_cpu != "x86" || v8_target_cpu == "arm"/true/' build/config/BUILDCONFIG.gn
            echo "Patched build/config/BUILDCONFIG.gn"
          fi
          
          echo "=== Patch complete ==="

      - name: GN Project Gen
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          mkdir -p out/Release_x86
          echo "LASTCHANGE=$VERSION-refs/heads/master@{#000000}" > build/util/LASTCHANGE
          gn gen out/Release_x86 --args='target_os="linux" target_cpu="x86" is_debug=false symbol_level=0 blink_symbol_level=0 enable_nacl=false is_official_build=true'
          
      - name: The 6-Hour Max Compile Battle
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          echo "Starting compiler..."
          autoninja -C out/Release_x86 chrome
