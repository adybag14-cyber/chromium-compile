name: Chromium i686 Build (Cloud Experiment)
on:
  push:
  workflow_dispatch:

jobs:
  experimental_build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Maximize Runner Disk Space
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get purge -y '^mysql-' '^mongodb-' '^postgresql-' '^dotnet-' '^android-sdk-' || true
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true
          echo "=== Disk space AFTER cleanup ==="
          df -h

      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ${{ github.workspace }}/depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          ${{ github.workspace }}/depot_tools/update_depot_tools

      - name: Get Latest Version String
        id: version
        run: |
          VERSION=$(curl -s "https://versionhistory.googleapis.com/v1/chrome/platforms/linux/channels/stable/versions" | jq -r '.versions[0].version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
             VERSION="126.0.6478.114"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Target Version: $VERSION"

      - name: Stream Extract Chromium Tarball
        run: |
          mkdir -p ${{ github.workspace }}/chromium_source
          echo "Streaming download and extracting simultaneously..."
          curl -sL "https://commondatastorage.googleapis.com/chromium-browser-official/chromium-$VERSION.tar.xz" | tar -xJ -C ${{ github.workspace }}/chromium_source --strip-components=1
          echo "Extraction complete. Size:"
          du -sh ${{ github.workspace }}/chromium_source

      - name: Install System Dependencies
        run: |
          cd ${{ github.workspace }}/chromium_source
          sudo DEBIAN_FRONTEND=noninteractive ./build/install-build-deps.sh --lib32 --no-arm --no-nacl --no-prompt --no-chromeos-fonts || echo "Ignoring dependency errors"

      - name: Install i386 Sysroot
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=i386

      - name: Patch GN for x86 Linux support
        run: |
          cd ${{ github.workspace }}/chromium_source
          python3 << 'PYEOF'
          import os
          import re

          # Files where is_valid_x86_target might be defined
          files_to_patch = [
              'build/config/BUILDCONFIG.gn',
              'build/config/BUILD.gn',
              'BUILD.gn',
              'v8/BUILD.gn',
          ]

          # Match: is_valid_x86_target = false (with optional surrounding whitespace/indent)
          var_pattern = re.compile(r'^(\s*)is_valid_x86_target\s*=\s*false\b', re.MULTILINE)

          patched_files = []

          for filepath in files_to_patch:
              if not os.path.exists(filepath):
                  print(f"Skip: {filepath} not found")
                  continue

              with open(filepath, 'r') as f:
                  content = f.read()

              def replace_var(match):
                  indent = match.group(1)
                  return indent + 'is_valid_x86_target = true'

              new_content, replacements = var_pattern.subn(replace_var, content)

              if replacements > 0:
                  with open(filepath, 'w') as f:
                      f.write(new_content)
                  print(f"Set is_valid_x86_target = true in {filepath} ({replacements} occurrence(s))")
                  patched_files.append(filepath)
              else:
                  print(f"No changes in {filepath}")

          if not patched_files:
              print("WARNING: Did not find is_valid_x86_target = false in any file.")
              print("This variable may not exist in this Chromium version,")
              print("or it may be defined elsewhere. GN gen will reveal if more patching is needed.")

          PYEOF

      - name: Write LASTCHANGE
        run: |
          cd ${{ github.workspace }}/chromium_source
          mkdir -p build/util
          # GN expects "<git-hash>-refs/heads/<branch>@{#<number>}"
          echo "LASTCHANGE=0000000000000000000000000000000000000000-refs/heads/main@{#0}" > build/util/LASTCHANGE
          cat build/util/LASTCHANGE

      - name: GN Project Gen
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          mkdir -p out/Release_x86
          gn gen out/Release_x86 --args='
            target_os="linux"
            target_cpu="x86"
            is_debug=false
            symbol_level=0
            blink_symbol_level=0
            enable_nacl=false
            is_official_build=false
            use_thin_lto=false
            use_reclient=false
            treat_warnings_as_errors=false
          '

      - name: The 6-Hour Max Compile Battle
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          echo "Starting compiler at $(date)..."
          echo "Disk space before build:"
          df -h
          autoninja -C out/Release_x86 chrome
          echo "Build finished at $(date)"
          echo "Final disk space:"
          df -h

      - name: Upload Build Artifact (if successful)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chromium-i686
          path: ${{ github.workspace }}/chromium_source/out/Release_x86/chrome
