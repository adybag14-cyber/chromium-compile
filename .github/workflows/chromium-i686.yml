name: Chromium i686 Build (Cloud Experiment)

on:
  push:
  workflow_dispatch:

jobs:
  experimental_build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Maximize Runner Disk Space
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get purge -y '^mysql-' '^mongodb-' '^postgresql-' '^dotnet-' '^android-sdk-' || true
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true
          echo "=== Disk space AFTER cleanup ==="
          df -h

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git python3 python3-pip curl jq xz-utils \
            build-essential pkg-config \
            libgtk-3-dev libnss3-dev libasound2-dev libxss-dev libxtst-dev libxrandr-dev \
            libxcomposite-dev libxdamage-dev libxfixes-dev libxrender-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libpango1.0-dev libcups2-dev libatk1.0-dev \
            libatspi2.0-dev libatk-bridge2.0-dev || true

      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ${{ github.workspace }}/depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          ${{ github.workspace }}/depot_tools/update_depot_tools

      - name: Get Latest Version String
        id: version
        run: |
          VERSION=$(curl -s "https://versionhistory.googleapis.com/v1/chrome/platforms/linux/channels/stable/versions" | jq -r '.versions[0].version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
             echo "::error::Failed to resolve latest Chromium version"
             exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Target Version: $VERSION"

      - name: Stream Extract Chromium Tarball
        run: |
          mkdir -p ${{ github.workspace }}/chromium_source
          echo "Streaming download and extracting simultaneously..."
          curl --retry 5 --retry-delay 5 -sL "https://commondatastorage.googleapis.com/chromium-browser-official/chromium-${{ env.VERSION }}.tar.xz" \
            | tar -xJ -C ${{ github.workspace }}/chromium_source --strip-components=1
          echo "Extraction complete. Size:"
          du -sh ${{ github.workspace }}/chromium_source

      - name: Install i386 Sysroot
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=i386

      - name: Patch BUILD.gn for x86 Linux
        id: patch
        run: |
          cd ${{ github.workspace }}/chromium_source
          python3 - << 'PYEOF'
          from pathlib import Path

          target = Path('BUILD.gn')
          text = target.read_text()
          lines = text.splitlines()
          print('Target file lines:', len(lines))

          print('Pre patch matches:')
          for i, line in enumerate(lines, 1):
              if 'is_valid_x86_target' in line or 'true)  # PATCHED: allow x86 linux' in line:
                  print(f'{i}: {line}')

          original = text

          text = text.replace('is_valid_x86_target = false', 'is_valid_x86_target = true')
          text = text.replace('is_valid_x86_target= false', 'is_valid_x86_target = true')
          text = text.replace('is_valid_x86_target=  false', 'is_valid_x86_target = true')
          text = text.replace('is_valid_x86_target =  false', 'is_valid_x86_target = true')
          text = text.replace('is_valid_x86_target=  false', 'is_valid_x86_target = true')

          new_lines = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if 'assert(' in line and 'is_valid_x86_target' in line:
                  block = []
                  j = i
                  while j < len(lines):
                      block.append(lines[j])
                      j += 1
                      if ')' in lines[j-1]:
                          break
                  block_text = '\n'.join(block)
                  if (
                      'is_valid_x86_target' in block_text
                      and 'target_cpu' in block_text
                      and 'x86' in block_text
                      and 'arm' in block_text
                  ):
                      print('Replacing block:', '\n' .join(f'{k+1}: {b}' for k,b in enumerate(block, i+1)))
                      new_lines.append('assert(true)  # PATCHED: allow x86 linux')
                      i = j
                      continue
              new_lines.append(line)
              i += 1

          text = '\n'.join(new_lines)
          if text != original:
              target.write_text(text)
              print('Patched BUILD.gn')
          else:
              print('No patch needed in BUILD.gn')

          lines = text.splitlines()
          hits = []
          for i, line in enumerate(lines, 1):
              if 'is_valid_x86_target' in line or 'PATCHED: allow x86 linux' in line:
                  hits.append((i, line))
          if not hits:
              raise SystemExit('BUILD.gn patch verification failed: no matching line found')
          print('Matched lines:')
          for i, line in hits:
              print(f'{i}: {line}')
          if not any('PATCHED: allow x86 linux' in line for _, line in hits):
              raise SystemExit('BUILD.gn patch verification failed: assertion guard still present')
          print('Verified: BUILD.gn patch is active')
          PYEOF

      - name: Report BUILD.gn patch result
        if: failure() && steps.patch.outcome == 'success'
        run: |
          echo "Patch step finished, but a later step failed."
          ls -l ${{ github.workspace }}/chromium_source/BUILD.gn || true
          sed -n '1488,1515p' ${{ github.workspace }}/chromium_source/BUILD.gn || true


      - name: Write LASTCHANGE
        run: |
          cd ${{ github.workspace }}/chromium_source
          mkdir -p build/util
          echo "LASTCHANGE=0000000000000000000000000000000000000000-refs/heads/main@{#0}" > build/util/LASTCHANGE
          cat build/util/LASTCHANGE

      - name: GN Project Gen
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          mkdir -p out/Release_x86
          gn gen out/Release_x86 --args='
            target_os="linux"
            target_cpu="x86"
            is_debug=false
            symbol_level=0
            blink_symbol_level=0
            enable_nacl=false
            is_official_build=false
            use_thin_lto=false
            use_reclient=false
            treat_warnings_as_errors=false
          '

      - name: The 6-Hour Max Compile Battle
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          echo "Starting compiler at $(date)..."
          echo "Disk space before build:"
          df -h
          autoninja -C out/Release_x86 -j2 chrome
          echo "Build finished at $(date)"
          echo "Final disk space:"
          df -h

      - name: Upload Build Artifact (if successful)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chromium-i686
          path: ${{ github.workspace }}/chromium_source/out/Release_x86/chrome
