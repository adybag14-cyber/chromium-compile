name: Chromium i686 Build (Cloud Experiment)

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  JOB_CHECKPOINT_MINUTES: "330"
  CHECKPOINT_RETENTION_DAYS: "2"
  CCACHE_MAX_SIZE: 8G

jobs:
  resolve_version:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Workflow Helpers
        uses: actions/checkout@v4

      - name: Get Latest Version String
        id: version
        run: |
          source .github/scripts/chromium_i686_common.sh
          VERSION="$(resolve_latest_version)"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Target Version: ${VERSION}"

  build_stage_1:
    name: Build Stage 1
    needs: resolve_version
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      complete: ${{ steps.compile.outputs.complete }}
    env:
      VERSION: ${{ needs.resolve_version.outputs.version }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: Checkout Workflow Helpers
        uses: actions/checkout@v4

      - name: Mark Job Start
        run: echo "JOB_STARTED_AT=$(date +%s)" >> "${GITHUB_ENV}"

      - name: Maximize Runner Disk Space
        run: |
          source .github/scripts/chromium_i686_common.sh
          maximize_runner_disk_space

      - name: Install System Dependencies
        run: |
          source .github/scripts/chromium_i686_common.sh
          install_system_dependencies

      - name: Install depot_tools
        run: |
          source .github/scripts/chromium_i686_common.sh
          install_depot_tools

      - name: Restore ccache
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: ${{ env.CCACHE_DIR }}
          key: chromium-i686-ccache-${{ env.VERSION }}-${{ github.run_id }}-${{ github.run_attempt }}-stage-1
          restore-keys: |
            chromium-i686-ccache-${{ env.VERSION }}-

      - name: Prepare Chromium Source
        run: |
          source .github/scripts/chromium_i686_common.sh
          prepare_chromium_source "${VERSION}"
          install_chromium_clang
          install_i386_sysroot
          patch_build_gn_for_x86_linux
          write_lastchange
          configure_ccache
          restore_out_checkpoint ""
          configure_gn

      - name: Compile Until Checkpoint
        id: compile
        run: |
          source .github/scripts/chromium_i686_common.sh
          run_build_until_checkpoint "${GITHUB_OUTPUT}"

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: ${{ env.CCACHE_DIR }}
          key: chromium-i686-ccache-${{ env.VERSION }}-${{ github.run_id }}-${{ github.run_attempt }}-stage-1

      - name: Create Stage 1 Checkpoint
        if: steps.compile.outputs.complete != 'true'
        run: |
          source .github/scripts/chromium_i686_common.sh
          create_out_checkpoint

      - name: Upload Stage 1 Checkpoint
        if: steps.compile.outputs.complete != 'true'
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: chromium-i686-out-stage-1
          path: ${{ github.workspace }}/checkpoints/out-Release_x86.tar.zst
          retention-days: ${{ env.CHECKPOINT_RETENTION_DAYS }}
          compression-level: 0
          if-no-files-found: error

      - name: Package Chromium i686 Build
        if: steps.compile.outputs.complete == 'true'
        run: |
          source .github/scripts/chromium_i686_common.sh
          package_chromium_i686 "${VERSION}"

      - name: Upload Build Artifact
        if: steps.compile.outputs.complete == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: chromium-${{ env.VERSION }}-linux-i686
          path: |
            ${{ github.workspace }}/chromium-${{ env.VERSION }}-linux-i686.tar.xz
            ${{ github.workspace }}/chromium-${{ env.VERSION }}-linux-i686.tar.xz.sha256
            ${{ github.workspace }}/chromium-${{ env.VERSION }}-linux-i686-manifest.txt

      - name: Publish GitHub Release
        if: steps.compile.outputs.complete == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source .github/scripts/chromium_i686_common.sh
          publish_chromium_release "${VERSION}"

  build_stage_2:
    name: Build Stage 2
    needs: [resolve_version, build_stage_1]
    if: ${{ always() && needs.build_stage_1.result == 'success' && needs.build_stage_1.outputs.complete != 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 360
