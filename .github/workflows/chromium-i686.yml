name: Chromium i686 Build (Cloud Experiment)

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  experimental_build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Maximize Runner Disk Space
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get purge -y '^mysql-' '^mongodb-' '^postgresql-' '^dotnet-' '^android-sdk-' || true
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true
          echo "=== Disk space AFTER cleanup ==="
          df -h

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git python3 python3-pip curl jq xz-utils \
            build-essential pkg-config \
            libgtk-3-dev libnss3-dev libasound2-dev libxss-dev libxtst-dev libxrandr-dev \
            libxcomposite-dev libxdamage-dev libxfixes-dev libxrender-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libpango1.0-dev libcups2-dev libatk1.0-dev \
            libatspi2.0-dev libatk-bridge2.0-dev || true

      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ${{ github.workspace }}/depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          ${{ github.workspace }}/depot_tools/update_depot_tools

      - name: Get Latest Version String
        id: version
        run: |
          VERSION=$(curl -s "https://versionhistory.googleapis.com/v1/chrome/platforms/linux/channels/stable/versions" | jq -r '.versions[0].version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
             echo "::error::Failed to resolve latest Chromium version"
             exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Target Version: $VERSION"

      - name: Stream Extract Chromium Tarball
        run: |
          mkdir -p ${{ github.workspace }}/chromium_source
          echo "Streaming download and extracting simultaneously..."
          curl --retry 5 --retry-delay 5 -sL "https://commondatastorage.googleapis.com/chromium-browser-official/chromium-${{ env.VERSION }}.tar.xz" \
            | tar -xJ -C ${{ github.workspace }}/chromium_source --strip-components=1
          echo "Extraction complete. Size:"
          du -sh ${{ github.workspace }}/chromium_source

      - name: Install i386 Sysroot
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=i386

      - name: Patch BUILD.gn for x86 Linux
        id: patch
        shell: bash -e {0}
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/chromium_source"
          candidate="BUILD.gn"
          echo "Patch target: $candidate"
          python3 - <<'PY'
          from pathlib import Path

          path = Path("BUILD.gn")
          text = path.read_text()
          old = 'is_valid_x86_target || target_cpu != "x86" || v8_target_cpu == "arm",'
          new = (
              'is_valid_x86_target || target_cpu != "x86" || '
              'v8_target_cpu == "arm" || target_os == "linux",'
          )
          if new not in text:
              if old not in text:
                  raise SystemExit("Could not find x86 target assertion predicate in BUILD.gn")
              text = text.replace(old, new, 1)
              path.write_text(text)
          PY
          echo "PATCHED SNIPPET:"
          grep -n -A4 -B2 "target_cpu=x86.*target_os=linux\|is_valid_x86_target" "$candidate" || true

      - name: Write LASTCHANGE
        run: |
          cd ${{ github.workspace }}/chromium_source
          mkdir -p build/util
          echo "LASTCHANGE=0000000000000000000000000000000000000000-refs/heads/main@{#0}" > build/util/LASTCHANGE
          cat build/util/LASTCHANGE

      - name: GN Project Gen
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          mkdir -p out/Release_x86
          gn gen out/Release_x86 --args='
            target_os="linux"
            target_cpu="x86"
            is_debug=false
            symbol_level=0
            blink_symbol_level=0
            enable_nacl=false
            is_official_build=false
            use_thin_lto=false
            use_reclient=false
            treat_warnings_as_errors=false
          '

      - name: The 6-Hour Max Compile Battle
        run: |
          cd ${{ github.workspace }}/chromium_source
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          echo "Starting compiler at $(date)..."
          echo "Disk space before build:"
          df -h
          autoninja -C out/Release_x86 -j2 chrome
          echo "Build finished at $(date)"
          echo "Final disk space:"
          df -h

      - name: Package Chromium i686 Build
        if: success()
        run: |
          set -euo pipefail
          cd ${{ github.workspace }}/chromium_source/out/Release_x86
          package="${{ github.workspace }}/chromium-${{ env.VERSION }}-linux-i686.tar.xz"
          manifest="${{ github.workspace }}/chromium-${{ env.VERSION }}-linux-i686-manifest.txt"
          {
            echo "version=${{ env.VERSION }}"
            echo "target_cpu=x86"
            echo "target_os=linux"
            echo "source_tarball=https://commondatastorage.googleapis.com/chromium-browser-official/chromium-${{ env.VERSION }}.tar.xz"
            echo "github_sha=${{ github.sha }}"
            echo
            find . -maxdepth 1 -type f -printf '%P\n' | sort
          } > "$manifest"
          shopt -s nullglob
          files=(chrome)
          for optional in chrome_sandbox locales; do
            if [ -e "$optional" ]; then
              files+=("$optional")
            fi
          done
          extra_runtime=(*.pak *.bin *.dat)
          files+=("${extra_runtime[@]}")
          {
            echo
            echo "packaged_files:"
            printf '%s\n' "${files[@]}"
          } >> "$manifest"
          tar -cJf "$package" "${files[@]}" || {
            echo "::error::Failed to package Chromium runtime files"
            find . -maxdepth 1 -type f -printf '%P\n' | sort
            exit 1
          }
          sha256sum "$package" > "${package}.sha256"
          ls -lh "$package" "${package}.sha256" "$manifest"

      - name: Upload Build Artifact (if successful)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chromium-${{ env.VERSION }}-linux-i686
          path: |
            ${{ github.workspace }}/chromium-${{ env.VERSION }}-linux-i686.tar.xz
            ${{ github.workspace }}/chromium-${{ env.VERSION }}-linux-i686.tar.xz.sha256
            ${{ github.workspace }}/chromium-${{ env.VERSION }}-linux-i686-manifest.txt

      - name: Publish GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: chromium-${{ env.VERSION }}-linux-i686
        run: |
          set -euo pipefail
          package="${{ github.workspace }}/chromium-${{ env.VERSION }}-linux-i686.tar.xz"
          checksum="${package}.sha256"
          manifest="${{ github.workspace }}/chromium-${{ env.VERSION }}-linux-i686-manifest.txt"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$package" "$checksum" "$manifest" --clobber
          else
            gh release create "$RELEASE_TAG" "$package" "$checksum" "$manifest" \
              --target "${{ github.sha }}" \
              --title "Chromium ${{ env.VERSION }} Linux i686" \
              --notes "Chromium ${{ env.VERSION }} Linux i686 build from GitHub Actions run ${{ github.run_id }}."
          fi
